name: Fix Auth System
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update files
        run: |
  echo '' | base64 -d > "package.json"
  echo "updated: package.json"
  echo '' | base64 -d > "middleware.ts"
  echo "updated: middleware.ts"
  mkdir -p "lib"
  echo '' | base64 -d > "lib/auth.ts"
  echo "updated: lib/auth.ts"
  mkdir -p "types"
  echo '' | base64 -d > "types/next-auth.d.ts"
  echo "updated: types/next-auth.d.ts"
  mkdir -p "app/api/auth/[...nextauth]"
  echo 'Ly8gYXBwL2FwaS9hdXRoL1suLi5uZXh0YXV0aF0vcm91dGUudHMKaW1wb3J0IE5leHRBdXRoIGZyb20gIm5leHQtYXV0aCIKaW1wb3J0IHsgYXV0aE9wdGlvbnMgfSBmcm9tICJAL2xpYi9hdXRoIgoKY29uc3QgaGFuZGxlciA9IE5leHRBdXRoKGF1dGhPcHRpb25zKQpleHBvcnQgeyBoYW5kbGVyIGFzIEdFVCwgaGFuZGxlciBhcyBQT1NUIH0K' | base64 -d > "app/api/auth/[...nextauth]/route.ts"
  echo "updated: app/api/auth/[...nextauth]/route.ts"
  mkdir -p "app/(auth)/auth/sign-in"
  echo '' | base64 -d > "app/(auth)/auth/sign-in/page.tsx"
  echo "updated: app/(auth)/auth/sign-in/page.tsx"
  mkdir -p "app/(auth)/auth/sign-up"
  echo '' | base64 -d > "app/(auth)/auth/sign-up/page.tsx"
  echo "updated: app/(auth)/auth/sign-up/page.tsx"
  mkdir -p "app/(auth)"
  echo '' | base64 -d > "app/(auth)/layout.tsx"
  echo "updated: app/(auth)/layout.tsx"
  mkdir -p "app/dashboard"
  echo '' | base64 -d > "app/dashboard/layout.tsx"
  echo "updated: app/dashboard/layout.tsx"
  mkdir -p "app/dashboard"
  echo '' | base64 -d > "app/dashboard/page.tsx"
  echo "updated: app/dashboard/page.tsx"
  mkdir -p "app/onboarding"
  echo '' | base64 -d > "app/onboarding/layout.tsx"
  echo "updated: app/onboarding/layout.tsx"
  mkdir -p "services"
  echo '' | base64 -d > "services/auth.service.ts"
  echo "updated: services/auth.service.ts"
      - name: Commit and push
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "fix: switch to next-auth v4, fix auth system"
          git push
